name: Sprint Task
description: A task for sprint work
labels: ["type: chore"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define when this task is complete.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: input
    id: effort
    attributes:
      label: Effort estimate
      description: Estimated hours.
      placeholder: "4h"
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Other issues or tasks this depends on.
    validations:
      required: false
