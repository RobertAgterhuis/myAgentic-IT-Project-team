name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check server.js syntax
        run: node -c .github/webapp/server.js

  test:
    name: Tests
    needs: syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.lines.pct)")
            echo "Line coverage: ${LINES}%"
            node -e "const c = require('./coverage/coverage-summary.json'); if (c.total.lines.pct < 70) { console.error('Coverage below 70% threshold'); process.exit(1); }"
          else
            echo "No coverage report found — skipping threshold check (expected in Sprint 1)"
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog-actions-scan@main
        with:
          path: ./
          extra_args: --only-verified
